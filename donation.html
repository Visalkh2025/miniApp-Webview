
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donate via KHQR</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;

    background:linear-gradient(
        180deg,
        #F5F7FB 0%,
        #EEF3F9 100%
    );

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "Segoe UI",
        sans-serif;
}

.card{

    width:100%;
    max-width:460px;

    background:#FFFFFF;

    border-radius:32px;

    overflow:hidden;

    box-shadow:
        0 24px 80px rgba(0,0,0,.10);
}

.header{

    background:linear-gradient(
        180deg,
        #1B3351 0%,
        #243F63 100%
    );

    padding:52px 24px;

    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{

    width:280px;
    max-width:100%;

    height:auto;

    display:block;
}

.content{

    padding:32px;

    text-align:center;
}

.title{

    font-size:30px;

    font-weight:700;

    color:#111827;

    margin-bottom:12px;
}

.description{

    color:#6B7280;

    font-size:15px;

    line-height:1.8;

    max-width:320px;

    margin:auto;
}

.qr{

    width:100%;

    max-width:330px;

    margin:28px auto;

    display:block;

    padding:8px;

    background:white;

    border-radius:24px;

    box-shadow:
        0 16px 40px rgba(0,0,0,.12);
}

.primary-button{

    display:block;

    width:100%;

    padding:16px;

    border-radius:18px;

    background:#1B3351;

    color:white;

    text-decoration:none;

    font-size:16px;

    font-weight:700;

    transition:.2s;
}

.primary-button:hover{

    opacity:.95;
}

</style>

</head>

<body>

<div class="card">

    <div class="header">

        <img
            class="logo"
            src="https://www.acledabank.com.kh/kh/assets/layout/logo3.png"
            alt="ACLEDA Logo">

    </div>

    <div class="content">

        <div class="title">
            Donate via KHQR
        </div>

        <div class="description">
            Scan the KHQR below using any
            KHQR-supported banking application.
        </div>

        <img
            class="qr"
            src="https://www.acledabank.com.kh/qr/toanchet-manual/FKC-QR-KHR.jpg"
            alt="KHQR Donation">

        <a
            class="primary-button"
            href="https://acledabank.com.kh/acleda?id=bill&billId=1095&comcode=KH0144">

            Start Donation with AC Super App

        </a>

    </div>

</div>

</body>
</html>
